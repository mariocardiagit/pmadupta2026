<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord KoboToolbox</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome pour les icônes -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { 
            background-color: #f4f7f6; 
            padding: 20px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-title {
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .filter-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border-top: 4px solid #3498db;
        }
        .table-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .filter-label { 
            font-weight: 600; 
            color: #34495e; 
            font-size: 0.9rem;
        }
        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
        }
        .table-responsive {
            max-height: 600px;
        }
        thead th {
            position: sticky;
            top: 0;
            background-color: #2c3e50 !important;
            color: white !important;
            z-index: 1;
            font-weight: 500;
        }
        .spinner-container {
            display: none;
            padding: 40px;
            text-align: center;
        }
        .error-message {
            display: none;
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h2 class="text-center header-title"><i class="fas fa-database"></i> Tableau de Bord : Données KoboToolbox</h2>

        <!-- Panneau de Filtres -->
        <div class="filter-card">
            <h5 class="mb-3 text-secondary"><i class="fas fa-filter"></i> Filtres de recherche</h5>
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="filter-label">DREN</label>
                    <input type="text" id="filter-dren" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-3">
                    <label class="filter-label">CISCO</label>
                    <input type="text" id="filter-cisco" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-3">
                    <label class="filter-label">ZAP</label>
                    <input type="text" id="filter-zap" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-3">
                    <label class="filter-label">Activité</label>
                    <input type="text" id="filter-activite" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-4">
                    <label class="filter-label">Produit</label>
                    <input type="text" id="filter-produit" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-4">
                    <label class="filter-label">Sous-activité</label>
                    <input type="text" id="filter-sous-activite" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-4">
                    <label class="filter-label">Sous-produit</label>
                    <input type="text" id="filter-sous-produit" class="form-control filter-input" placeholder="Rechercher...">
                </div>
            </div>
            <div class="mt-3 text-end">
                <button class="btn btn-outline-secondary btn-sm" onclick="clearFilters()">
                    <i class="fas fa-times"></i> Réinitialiser les filtres
                </button>
            </div>
        </div>

        <!-- Messages et Chargement -->
        <div class="error-message" id="error-box"></div>
        <div class="spinner-container" id="loading-box">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Chargement...</span>
            </div>
            <h5 class="mt-3 text-secondary">Récupération des données depuis KoboToolbox...</h5>
        </div>

        <!-- Tableau des données -->
        <div class="table-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0 text-secondary"><i class="fas fa-table"></i> Résultats (<span id="record-count">0</span> lignes)</h5>
                <button class="btn btn-success btn-sm" onclick="exportTableToCSV('donnees_kobo.csv')">
                    <i class="fas fa-file-csv"></i> Exporter CSV
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-hover table-bordered align-middle" id="data-table">
                    <thead>
                        <tr>
                            <th>DREN</th>
                            <th>CISCO</th>
                            <th>ZAP</th>
                            <th>Activité</th>
                            <th>Produit</th>
                            <th>Sous-activité</th>
                            <th>Sous-produit</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Les lignes seront insérées ici par JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Scripts Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const apiUrl = 'https://kf.kobotoolbox.org/api/v2/assets/ath6cv2NrXEUijffeKJqSf/data.json';
        let allData = [];

        // Fonction pour extraire intelligemment la valeur Kobo (gère les groupes/catégories)
        function getKoboValue(row, possibleKeys) {
            for (let key of Object.keys(row)) {
                let keyLower = key.toLowerCase();
                for (let pk of possibleKeys) {
                    if (keyLower === pk || keyLower.endsWith('/' + pk) || keyLower.endsWith('_' + pk)) {
                        return row[key] || '';
                    }
                }
            }
            return '';
        }

        async function fetchData() {
            $('#loading-box').show();
            $('#error-box').hide();
            $('#table-body').empty();
            
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    if(response.status === 401) {
                        throw new Error('Erreur 401 : Accès non autorisé. Le formulaire KoboToolbox n'est pas public. Activez le partage public dans les paramètres du projet Kobo.');
                    }
                    throw new Error('Erreur réseau : Code ' + response.status);
                }
                const json = await response.json();
                allData = json.results || [];
                renderTable(allData);
            } catch (error) {
                $('#error-box').html('<strong><i class="fas fa-exclamation-triangle"></i> Erreur lors du chargement :</strong> ' + error.message + 
                '<br><small>Astuce : Si vous avez un problème CORS, utilisez un proxy ou vérifiez la visibilité publique des données sur KoboToolbox.</small>').show();
            } finally {
                $('#loading-box').hide();
            }
        }

        function renderTable(data) {
            const tbody = $('#table-body');
            tbody.empty();
            
            if (data.length === 0) {
                tbody.append('<tr><td colspan="7" class="text-center py-4 text-muted">Aucune donnée trouvée ou formulaire vide.</td></tr>');
                $('#record-count').text(0);
                return;
            }

            data.forEach(row => {
                // Mappage flexible des noms de variables Kobo
                const dren = getKoboValue(row, ['dren']);
                const cisco = getKoboValue(row, ['cisco']);
                const zap = getKoboValue(row, ['zap']);
                const activite = getKoboValue(row, ['activite', 'activité']);
                const produit = getKoboValue(row, ['produit']);
                const sousActivite = getKoboValue(row, ['sous_activite', 'sous-activite', 'sous_activité', 'sous-activité']);
                const sousProduit = getKoboValue(row, ['sous_produit', 'sous-produit']);

                const tr = $('<tr></tr>');
                tr.append($('<td></td>').text(dren));
                tr.append($('<td></td>').text(cisco));
                tr.append($('<td></td>').text(zap));
                tr.append($('<td></td>').text(activite));
                tr.append($('<td></td>').text(produit));
                tr.append($('<td></td>').text(sousActivite));
                tr.append($('<td></td>').text(sousProduit));
                
                // Stockage des textes en minuscules pour un filtrage ultra-rapide
                tr.data('search', {
                    dren: String(dren).toLowerCase(),
                    cisco: String(cisco).toLowerCase(),
                    zap: String(zap).toLowerCase(),
                    activite: String(activite).toLowerCase(),
                    produit: String(produit).toLowerCase(),
                    sousActivite: String(sousActivite).toLowerCase(),
                    sousProduit: String(sousProduit).toLowerCase()
                });

                tbody.append(tr);
            });
            $('#record-count').text(data.length);
        }

        function applyFilters() {
            const filterDren = $('#filter-dren').val().toLowerCase();
            const filterCisco = $('#filter-cisco').val().toLowerCase();
            const filterZap = $('#filter-zap').val().toLowerCase();
            const filterActivite = $('#filter-activite').val().toLowerCase();
            const filterProduit = $('#filter-produit').val().toLowerCase();
            const filterSousActivite = $('#filter-sous-activite').val().toLowerCase();
            const filterSousProduit = $('#filter-sous-produit').val().toLowerCase();

            let visibleCount = 0;

            $('#table-body tr').each(function() {
                const s = $(this).data('search');
                if (!s) return; // Ignore la ligne "Aucune donnée"

                const match = s.dren.includes(filterDren) &&
                              s.cisco.includes(filterCisco) &&
                              s.zap.includes(filterZap) &&
                              s.activite.includes(filterActivite) &&
                              s.produit.includes(filterProduit) &&
                              s.sousActivite.includes(filterSousActivite) &&
                              s.sousProduit.includes(filterSousProduit);

                if (match) {
                    $(this).show();
                    visibleCount++;
                } else {
                    $(this).hide();
                }
            });
            $('#record-count').text(visibleCount);
        }

        function clearFilters() {
            $('.filter-input').val('');
            applyFilters();
        }
        
        function downloadCSV(csv, filename) {
            let csvFile;
            let downloadLink;
            // Ajout du BOM pour le support UTF-8 (accents) sous Excel
            let BOM = "\uFEFF";
            csvFile = new Blob([BOM + csv], {type: "text/csv;charset=utf-8;"});
            downloadLink = document.createElement("a");
            downloadLink.download = filename;
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }

        function exportTableToCSV(filename) {
            let csv = [];
            let rows = document.querySelectorAll("#data-table tr");
            
            for (let i = 0; i < rows.length; i++) {
                // Ne pas exporter les lignes masquées par le filtre
                if (rows[i].style.display !== 'none') {
                    let row = [], cols = rows[i].querySelectorAll("td, th");
                    for (let j = 0; j < cols.length; j++) {
                        let data = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, '').replace(/"/g, '""');
                        row.push('"' + data + '"');
                    }
                    csv.push(row.join(";")); // Séparateur point-virgule pour Excel FR
                }
            }
            downloadCSV(csv.join("\n"), filename);
        }

        $(document).ready(function() {
            fetchData();
            // Délai pour éviter de surcharger le navigateur lors de la frappe
            let typingTimer;
            const doneTypingInterval = 300; 
            
            $('.filter-input').on('keyup', function () {
                clearTimeout(typingTimer);
                typingTimer = setTimeout(applyFilters, doneTypingInterval);
            });
            $('.filter-input').on('change', applyFilters);
        });
    </script>
</body>
</html>
