<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord KoboToolbox</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome pour les icônes -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { 
            background-color: #f4f7f6; 
            padding: 20px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-title {
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .filter-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border-top: 4px solid #3498db;
        }
        .table-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .filter-label { 
            font-weight: 600; 
            color: #34495e; 
            font-size: 0.9rem;
        }
        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
        }
        .table-responsive {
            max-height: 600px;
            overflow-x: auto;
        }
        #data-table th, #data-table td {
            white-space: nowrap;
            vertical-align: middle;
        }
        thead th {
            position: sticky;
            top: 0;
            background-color: #2c3e50 !important;
            color: white !important;
            z-index: 1;
            font-weight: 500;
        }
        .spinner-container {
            display: none;
            padding: 40px;
            text-align: center;
        }
        .error-message {
            display: none;
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
        .sync-badge {
            font-size: 0.9rem;
            padding: 8px 12px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h2 class="text-center header-title"><i class="fas fa-database"></i> Tableau de Bord : Données KoboToolbox</h2>

        <!-- Panneau de Filtres -->
        <div class="filter-card">
            <h5 class="mb-3 text-secondary"><i class="fas fa-filter"></i> Filtres de recherche</h5>
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="filter-label" id="lbl-dren">DREN</label>
                    <input type="text" id="filter-dren" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-3">
                    <label class="filter-label" id="lbl-cisco">CISCO</label>
                    <input type="text" id="filter-cisco" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-3">
                    <label class="filter-label" id="lbl-zap">ZAP</label>
                    <input type="text" id="filter-zap" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-3">
                    <label class="filter-label" id="lbl-activite">Activité</label>
                    <input type="text" id="filter-activite" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-4">
                    <label class="filter-label" id="lbl-produit">Produit</label>
                    <input type="text" id="filter-produit" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-4">
                    <label class="filter-label" id="lbl-sous-activite">Sous-activité</label>
                    <input type="text" id="filter-sous-activite" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-4">
                    <label class="filter-label" id="lbl-sous-produit">Sous-produit</label>
                    <input type="text" id="filter-sous-produit" class="form-control filter-input" placeholder="Rechercher...">
                </div>
            </div>
            <div class="mt-3 text-end">
                <button class="btn btn-outline-secondary btn-sm" onclick="clearFilters()">
                    <i class="fas fa-times"></i> Réinitialiser les filtres
                </button>
            </div>
        </div>

        <!-- Messages et Chargement -->
        <div class="error-message" id="error-box"></div>
        <div class="spinner-container" id="loading-box">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Chargement...</span>
            </div>
            <h5 class="mt-3 text-secondary" id="loading-text">Synchronisation en cours avec KoboToolbox...</h5>
        </div>

        <!-- Tableau des données -->
        <div class="table-card">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <h5 class="m-0 text-secondary"><i class="fas fa-table"></i> Résultats (<span id="record-count">0</span> affichés)</h5>
                
                <div id="sync-status"></div>

                <div>
                    <button class="btn btn-primary btn-sm me-2" onclick="fetchData()">
                        <i class="fas fa-sync-alt"></i> Rafraîchir les données
                    </button>
                    <button class="btn btn-success btn-sm" onclick="exportTableToCSV('donnees_kobo.csv')">
                        <i class="fas fa-file-csv"></i> Exporter CSV
                    </button>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="table table-striped table-hover table-bordered align-middle" id="data-table">
                    <thead>
                        <tr>
                            <th>DREN</th>
                            <th>CISCO</th>
                            <th>ZAP</th>
                            <th>Activité</th>
                            <th>Produit</th>
                            <th>Sous-activité</th>
                            <th>Sous-produit</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Les lignes seront insérées ici par JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Scripts Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let allData = [];
        // Dictionnaires de traduction
        let headerMap = {};
        let valueMap = {};
        let questionListMap = {};

        // 1. Fonction pour extraire le schéma du formulaire Kobo (Les vrais Labels)
        async function fetchSchema() {
            const schemaUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://kf.kobotoolbox.org/api/v2/assets/ath6cv2NrXEUijffeKJqSf.json');
            try {
                const response = await fetch(schemaUrl, { cache: 'no-store' });
                if (!response.ok) return;
                const schema = await response.json();
                
                // Mappage des questions (En-têtes)
                if (schema.content && schema.content.survey) {
                    schema.content.survey.forEach(q => {
                        if (q.name) {
                            let label = q.label;
                            if (Array.isArray(label)) label = label[0];
                            if (typeof label === 'object' && label !== null) {
                                label = label[Object.keys(label)[0]]; 
                            }
                            // On stocke le nom XML en minuscules pour être sûr que ça corresponde
                            if (label) headerMap[String(q.name).toLowerCase()] = label;
                            
                            // Détection robuste des listes de choix (gère les espaces multiples)
                            let qType = q.type || '';
                            let listName = q.select_from_list_name; 
                            
                            if (!listName && (qType.includes('select_one') || qType.includes('select_multiple'))) {
                                // .split(/\s+/) sépare correctement même s'il y a 3 espaces de suite
                                let parts = qType.trim().split(/\s+/); 
                                if (parts.length > 1) listName = parts[1];
                            }
                            
                            if (listName) {
                                questionListMap[String(q.name).toLowerCase()] = String(listName).toLowerCase();
                            }
                        }
                    });
                }
                
                // Mappage des choix (Valeurs)
                if (schema.content && schema.content.choices) {
                    schema.content.choices.forEach(c => {
                        if (c.list_name && c.name !== undefined) {
                            let label = c.label;
                            if (Array.isArray(label)) label = label[0];
                            if (typeof label === 'object' && label !== null) {
                                label = label[Object.keys(label)[0]];
                            }
                            if (label) {
                                // Clé universelle en minuscules : "nom_de_liste::code_reponse"
                                let key = String(c.list_name).toLowerCase() + '::' + String(c.name).toLowerCase();
                                valueMap[key] = label;
                            }
                        }
                    });
                }
            } catch (e) {
                console.error("Erreur lors de la récupération des labels.", e);
            }
        }

        // 2. Fonctions de traduction (Code XML -> Label Vrai)
        function getTranslatedHeader(xmlName) {
            let key = String(xmlName).toLowerCase();
            if (headerMap[key]) return headerMap[key];
            return xmlName.toUpperCase().replace(/_/g, ' '); // Plan B
        }

        function getTranslatedValue(val, xmlName) {
            if (val === null || val === undefined || val === '') return '';
            if (Array.isArray(val)) return val; 
            
            let xmlNameLower = String(xmlName).toLowerCase();
            let listName = questionListMap[xmlNameLower];
            
            if (listName) {
                let parts = String(val).split(' '); // Kobo sépare les choix multiples par un espace
                let translatedParts = parts.map(p => {
                    let pLower = String(p).toLowerCase();
                    let t = valueMap[listName + '::' + pLower];
                    if (t) return p + ' : ' + t; // Formate en "Code : Texte Complet"
                    return p; // Si aucune traduction n'est trouvée, laisse le code brut
                });
                return translatedParts.join(' ; ');
            }
            return val;
        }

        function getKoboValue(row, possibleKeys, excludeKeys = []) {
            for (let key of Object.keys(row)) {
                let parts = key.split('/');
                let variableName = parts[parts.length - 1].toLowerCase();
                let originalXmlName = parts[parts.length - 1];
                
                let isExcluded = excludeKeys.some(ex => variableName.includes(ex));
                if (isExcluded) continue;

                for (let pk of possibleKeys) {
                    if (variableName.includes(pk)) {
                        let rawValue = row[key];
                        // Traduction instantanée de la valeur brute
                        return getTranslatedValue(rawValue, originalXmlName);
                    }
                }
            }
            return '';
        }

        function verifyDataSync(apiCount) {
            let tableCount = 0;
            if (apiCount > 0) tableCount = $('#table-body tr').length;

            const statusDiv = $('#sync-status');
            if (apiCount === tableCount) {
                statusDiv.html(`<span class="badge bg-success sync-badge"><i class="fas fa-check-double"></i> Intégrité Validée : ${apiCount} JSON = ${tableCount} HTML</span>`);
            } else {
                statusDiv.html(`<span class="badge bg-danger sync-badge"><i class="fas fa-exclamation-triangle"></i> Alerte de sécurité : JSON (${apiCount}) ≠ HTML (${tableCount})</span>`);
            }
        }

        async function fetchData() {
            $('#loading-box').show();
            $('#error-box').hide();
            $('#table-body').empty();
            $('#sync-status').html('<span class="badge bg-warning text-dark sync-badge"><i class="fas fa-spinner fa-spin"></i> Audit en cours...</span>');
            
            // ÉTAPE 1 : Le dictionnaire des libellés
            $('#loading-text').text("1/2: Récupération du dictionnaire Kobo...");
            await fetchSchema();

            // ÉTAPE 2 : Les données brutes
            $('#loading-text').text("2/2: Téléchargement des données de terrain...");
            const timestamp = new Date().getTime();
            const koboUrl = 'https://kf.kobotoolbox.org/api/v2/assets/ath6cv2NrXEUijffeKJqSf/data.json?_t=' + timestamp;
            const apiUrl = 'https://corsproxy.io/?' + encodeURIComponent(koboUrl);

            try {
                const response = await fetch(apiUrl, { 
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });
                
                if (!response.ok) throw new Error('Erreur réseau : Code ' + response.status);
                
                const json = await response.json();
                allData = json.results || [];
                
                renderTable(allData);
                verifyDataSync(allData.length);

            } catch (error) {
                $('#error-box').html('<strong>Erreur de synchronisation :</strong> ' + error.message).show();
                $('#sync-status').html('<span class="badge bg-danger sync-badge"><i class="fas fa-times-circle"></i> Échec du contrôle</span>');
            } finally {
                $('#loading-box').hide();
            }
        }

        function renderTable(data) {
            const tbody = $('#table-body');
            const theadTr = $('#data-table thead tr');
            
            tbody.empty();
            theadTr.find('th:gt(6)').remove();

            if (data.length === 0) {
                tbody.append('<tr><td colspan="100%" class="text-center py-4 text-muted">Aucune donnée trouvée sur le serveur KoboToolbox.</td></tr>');
                $('#record-count').text(0);
                return;
            }

            // A. Dynamisation des 7 en-têtes principaux
            let colXmlNames = { dren: null, cisco: null, zap: null, activite: null, produit: null, sousActivite: null, sousProduit: null };
            
            function findXmlName(row, possibleKeys, excludeKeys) {
                for (let key of Object.keys(row)) {
                    let parts = key.split('/');
                    let variableName = parts[parts.length - 1].toLowerCase();
                    let originalXmlName = parts[parts.length - 1];
                    let isExcluded = excludeKeys.some(ex => variableName.includes(ex));
                    if (isExcluded) continue;
                    for (let pk of possibleKeys) {
                        if (variableName.includes(pk)) return originalXmlName;
                    }
                }
                return null;
            }

            for(let r of data) {
                if (!colXmlNames.dren) colXmlNames.dren = findXmlName(r, ['dren'], ['activite', 'produit', 'budget', 'cisco', 'zap']);
                if (!colXmlNames.cisco) colXmlNames.cisco = findXmlName(r, ['cisco'], ['activite', 'produit', 'budget']);
                if (!colXmlNames.zap) colXmlNames.zap = findXmlName(r, ['zap'], ['activite', 'produit', 'budget']);
                if (!colXmlNames.activite) colXmlNames.activite = findXmlName(r, ['activite', 'activité'], ['sous_activite', 'sous-activite']);
                if (!colXmlNames.produit) colXmlNames.produit = findXmlName(r, ['produit'], ['sous_produit', 'sous-produit']);
                if (!colXmlNames.sousActivite) colXmlNames.sousActivite = findXmlName(r, ['sous_activite', 'sous-activite'], []);
                if (!colXmlNames.sousProduit) colXmlNames.sousProduit = findXmlName(r, ['sous_produit', 'sous-produit'], []);
            }

            let ths = $('#data-table thead tr th');
            $(ths[0]).text(colXmlNames.dren ? getTranslatedHeader(colXmlNames.dren) : 'DREN');
            $(ths[1]).text(colXmlNames.cisco ? getTranslatedHeader(colXmlNames.cisco) : 'CISCO');
            $(ths[2]).text(colXmlNames.zap ? getTranslatedHeader(colXmlNames.zap) : 'ZAP');
            $(ths[3]).text(colXmlNames.activite ? getTranslatedHeader(colXmlNames.activite) : 'Activité');
            $(ths[4]).text(colXmlNames.produit ? getTranslatedHeader(colXmlNames.produit) : 'Produit');
            $(ths[5]).text(colXmlNames.sousActivite ? getTranslatedHeader(colXmlNames.sousActivite) : 'Sous-activité');
            $(ths[6]).text(colXmlNames.sousProduit ? getTranslatedHeader(colXmlNames.sousProduit) : 'Sous-produit');


            // B. Détection et traduction des colonnes supplémentaires (à droite)
            let extraKeysSet = new Set();
            
            function isBaseColumn(key) {
                let parts = key.split('/');
                let v = parts[parts.length - 1].toLowerCase();
                let isEx = (arr) => arr.some(ex => v.includes(ex));

                if (v.includes('dren') && !isEx(['activite', 'produit', 'budget', 'cisco', 'zap'])) return true;
                if (v.includes('cisco') && !isEx(['activite', 'produit', 'budget'])) return true;
                if (v.includes('zap') && !isEx(['activite', 'produit', 'budget'])) return true;
                if ((v.includes('activite') || v.includes('activité')) && !isEx(['sous_activite', 'sous-activite'])) return true;
                if (v.includes('produit') && !isEx(['sous_produit', 'sous-produit'])) return true;
                if (v.includes('sous_activite') || v.includes('sous-activite')) return true;
                if (v.includes('sous_produit') || v.includes('sous-produit')) return true;
                
                return false;
            }

            data.forEach(row => {
                Object.keys(row).forEach(key => {
                    if (key.startsWith('_') || key.startsWith('meta/') || key === 'formhub/uuid') return;
                    if (!isBaseColumn(key)) extraKeysSet.add(key);
                });
            });

            let extraKeys = Array.from(extraKeysSet);
            extraKeys.forEach(key => {
                let xmlName = key.split('/').pop();
                let cleanName = getTranslatedHeader(xmlName); 
                theadTr.append(`<th>${cleanName}</th>`);
            });

            function formatExtraValue(val, colName, rowData, xmlName) {
                if (val === null || val === undefined) return '';

                let translatedVal = getTranslatedValue(val, xmlName);

                let parts = [];
                if (Array.isArray(translatedVal)) {
                    parts = translatedVal.map(item => {
                        if (typeof item === 'object') return Object.values(item).join(' | ');
                        return String(item);
                    });
                } else {
                    parts = [String(translatedVal)];
                }

                if (colName && colName.includes('ENTITE')) {
                    let allSubParts = parts.flatMap(p => p.split(/\s*;\s*/)).filter(Boolean);
                    parts = [...new Set(allSubParts)];
                } else if (colName && colName.includes('OBSERVATIONS')) {
                    let allSubParts = parts.flatMap(p => p.split(/\s*;\s*/)).filter(Boolean);
                    parts = allSubParts;
                }

                const linkify = (str) => {
                    if (!rowData || !rowData._attachments) return str;
                    let subParts = str.split(' | ');
                    let linkifiedSubParts = subParts.map(subStr => {
                        let att = rowData._attachments.find(a => a.media_file_basename === subStr);
                        if (att && att.download_url) {
                            return `<a href="${att.download_url}" target="_blank" class="badge bg-primary text-white text-decoration-none py-1 px-2 mx-1 shadow-sm" title="Ouvrir le fichier"><i class="fas fa-external-link-alt"></i> ${subStr}</a>`;
                        }
                        return subStr;
                    });
                    return linkifiedSubParts.join(' | ');
                };

                return parts.map(p => linkify(p)).join(' ; ');
            }

            data.forEach(row => {
                const dren = getKoboValue(row, ['dren'], ['activite', 'produit', 'budget', 'cisco', 'zap']);
                const cisco = getKoboValue(row, ['cisco'], ['activite', 'produit', 'budget']);
                const zap = getKoboValue(row, ['zap'], ['activite', 'produit', 'budget']);
                const activite = getKoboValue(row, ['activite', 'activité'], ['sous_activite', 'sous-activite']);
                const produit = getKoboValue(row, ['produit'], ['sous_produit', 'sous-produit']);
                const sousActivite = getKoboValue(row, ['sous_activite', 'sous-activite'], []);
                const sousProduit = getKoboValue(row, ['sous_produit', 'sous-produit'], []);

                const tr = $('<tr></tr>');
                tr.append($('<td></td>').text(dren));
                tr.append($('<td></td>').text(cisco));
                tr.append($('<td></td>').text(zap));
                tr.append($('<td></td>').text(activite));
                tr.append($('<td></td>').text(produit));
                tr.append($('<td></td>').text(sousActivite));
                tr.append($('<td></td>').text(sousProduit));
                
                extraKeys.forEach(key => {
                    let xmlName = key.split('/').pop();
                    let colName = xmlName.toUpperCase();
                    let valHtml = formatExtraValue(row[key], colName, row, xmlName);
                    tr.append($('<td></td>').html(valHtml));
                });

                tr.data('search', {
                    dren: String(dren).toLowerCase(),
                    cisco: String(cisco).toLowerCase(),
                    zap: String(zap).toLowerCase(),
                    activite: String(activite).toLowerCase(),
                    produit: String(produit).toLowerCase(),
                    sousActivite: String(sousActivite).toLowerCase(),
                    sousProduit: String(sousProduit).toLowerCase()
                });

                tbody.append(tr);
            });
            $('#record-count').text(data.length);
        }

        function applyFilters() {
            const filters = {
                dren: $('#filter-dren').val().toLowerCase(),
                cisco: $('#filter-cisco').val().toLowerCase(),
                zap: $('#filter-zap').val().toLowerCase(),
                activite: $('#filter-activite').val().toLowerCase(),
                produit: $('#filter-produit').val().toLowerCase(),
                sousActivite: $('#filter-sous-activite').val().toLowerCase(),
                sousProduit: $('#filter-sous-produit').val().toLowerCase()
            };

            let visibleCount = 0;
            $('#table-body tr').each(function() {
                const s = $(this).data('search');
                if (!s) return; 

                const match = Object.keys(filters).every(k => s[k].includes(filters[k]));

                if (match) {
                    $(this).show();
                    visibleCount++;
                } else {
                    $(this).hide();
                }
            });
            $('#record-count').text(visibleCount);
        }

        function clearFilters() {
            $('.filter-input').val('');
            applyFilters();
        }
        
        function downloadCSV(csv, filename) {
            let csvFile = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8;"});
            let downloadLink = document.createElement("a");
            downloadLink.download = filename;
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }

        function exportTableToCSV(filename) {
            let csv = [];
            let rows = document.querySelectorAll("#data-table tr");
            
            for (let i = 0; i < rows.length; i++) {
                if (rows[i].style.display !== 'none') {
                    let row = [], cols = rows[i].querySelectorAll("td, th");
                    for (let j = 0; j < cols.length; j++) {
                        let data = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, '').replace(/"/g, '""').trim();
                        row.push('"' + data + '"');
                    }
                    csv.push(row.join(";")); 
                }
            }
            downloadCSV(csv.join("\n"), filename);
        }

        $(document).ready(function() {
            fetchData();
            let typingTimer;
            $('.filter-input').on('keyup', function () {
                clearTimeout(typingTimer);
                typingTimer = setTimeout(applyFilters, 300);
            });
            $('.filter-input').on('change', applyFilters);
        });
    </script>
</body>
</html>
