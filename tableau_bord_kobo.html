<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord KoboToolbox</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome pour les icônes -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { 
            background-color: #f4f7f6; 
            padding: 20px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-title {
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .filter-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border-top: 4px solid #3498db;
        }
        .table-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .filter-label { 
            font-weight: 600; 
            color: #34495e; 
            font-size: 0.9rem;
        }
        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
        }
        .table-responsive {
            max-height: 600px;
            overflow-x: auto;
        }
        #data-table th, #data-table td {
            white-space: nowrap;
            vertical-align: middle;
            text-align: center;
        }
        /* Style pour la ligne supérieure de groupement */
        .group-header-survey {
            background-color: #2980b9 !important;
            color: white !important;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #1f618d !important;
        }
        .group-header-meta {
            background-color: #7f8c8d !important;
            color: white !important;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #616a6b !important;
        }
        /* Style pour les en-têtes individuels */
        .sub-header-survey {
            background-color: #34495e !important;
            color: white !important;
            font-weight: 500;
        }
        .sub-header-meta {
            background-color: #95a5a6 !important;
            color: white !important;
            font-weight: 500;
        }
        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .spinner-container {
            display: none;
            padding: 40px;
            text-align: center;
        }
        .error-message {
            display: none;
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
        .sync-badge {
            font-size: 0.9rem;
            padding: 8px 12px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h2 class="text-center header-title"><i class="fas fa-database"></i> Tableau de Bord : Données KoboToolbox</h2>

        <!-- Panneau de Filtres -->
        <div class="filter-card">
            <h5 class="mb-3 text-secondary"><i class="fas fa-filter"></i> Filtres de recherche</h5>
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="filter-label" id="lbl-dren">DREN</label>
                    <input type="text" id="filter-dren" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-3">
                    <label class="filter-label" id="lbl-cisco">CISCO</label>
                    <input type="text" id="filter-cisco" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-3">
                    <label class="filter-label" id="lbl-zap">ZAP</label>
                    <input type="text" id="filter-zap" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-3">
                    <label class="filter-label" id="lbl-activite">Activité</label>
                    <input type="text" id="filter-activite" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-4">
                    <label class="filter-label" id="lbl-produit">Produit</label>
                    <input type="text" id="filter-produit" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-4">
                    <label class="filter-label" id="lbl-sous-activite">Sous-activité</label>
                    <input type="text" id="filter-sous-activite" class="form-control filter-input" placeholder="Rechercher...">
                </div>
                <div class="col-md-4">
                    <label class="filter-label" id="lbl-sous-produit">Sous-produit</label>
                    <input type="text" id="filter-sous-produit" class="form-control filter-input" placeholder="Rechercher...">
                </div>
            </div>
            <div class="mt-3 text-end">
                <button class="btn btn-outline-secondary btn-sm" onclick="clearFilters()">
                    <i class="fas fa-times"></i> Réinitialiser les filtres
                </button>
            </div>
        </div>

        <!-- Messages et Chargement -->
        <div class="error-message" id="error-box"></div>
        <div class="spinner-container" id="loading-box">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Chargement...</span>
            </div>
            <h5 class="mt-3 text-secondary" id="loading-text">Synchronisation en cours avec KoboToolbox...</h5>
        </div>

        <!-- Tableau des données -->
        <div class="table-card">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <h5 class="m-0 text-secondary"><i class="fas fa-table"></i> Résultats (<span id="record-count">0</span> affichés)</h5>
                
                <div id="sync-status"></div>

                <div>
                    <button class="btn btn-primary btn-sm me-2" onclick="fetchData()">
                        <i class="fas fa-sync-alt"></i> Rafraîchir les données
                    </button>
                    <button class="btn btn-success btn-sm" onclick="exportTableToCSV('donnees_kobo.csv')">
                        <i class="fas fa-file-csv"></i> Exporter CSV
                    </button>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="table table-striped table-hover table-bordered align-middle" id="data-table">
                    <thead>
                        <!-- Ligne 1 : Les Grands Groupes (Générée dynamiquement en JS) -->
                        <tr id="table-group-header-row"></tr>
                        <!-- Ligne 2 : Les En-têtes individuels (Générée dynamiquement en JS) -->
                        <tr id="table-sub-header-row"></tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Les lignes seront insérées ici par JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Scripts Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let allData = [];
        let headerMap = {};
        let valueMap = {};
        let questionListMap = {};

        // Liste explicite des mots-clés identifiant les métadonnées système automatiques de Kobo
        const metaKeywords = ['start', 'end', 'today', 'username', 'phonenumber', 'deviceid', 'simserial', 'subscriberid', '_id', '_uuid', '_submission_time', '_status', '_geolocation', '_submitted_by', '_xform_id_string', '__version__', 'instanceid', 'rootuuid', 'version'];

        async function fetchSchema() {
            const schemaUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://kf.kobotoolbox.org/api/v2/assets/ath6cv2NrXEUijffeKJqSf.json');
            try {
                const response = await fetch(schemaUrl, { cache: 'no-store' });
                if (!response.ok) return;
                const schema = await response.json();
                
                if (schema.content && schema.content.survey) {
                    schema.content.survey.forEach(q => {
                        if (q.name) {
                            let label = q.label;
                            if (Array.isArray(label)) label = label[0];
                            if (typeof label === 'object' && label !== null) {
                                label = label[Object.keys(label)[0]]; 
                            }
                            if (label) headerMap[String(q.name).toLowerCase()] = label;
                            
                            let qType = q.type || '';
                            let listName = q.select_from_list_name; 
                            
                            if (!listName && (qType.includes('select_one') || qType.includes('select_multiple'))) {
                                let parts = qType.trim().split(/\s+/); 
                                if (parts.length > 1) listName = parts[1];
                            }
                            if (listName) {
                                questionListMap[String(q.name).toLowerCase()] = String(listName).toLowerCase();
                            }
                        }
                    });
                }
                
                if (schema.content && schema.content.choices) {
                    schema.content.choices.forEach(c => {
                        if (c.list_name && c.name !== undefined) {
                            let label = c.label;
                            if (Array.isArray(label)) label = label[0];
                            if (typeof label === 'object' && label !== null) {
                                label = label[Object.keys(label)[0]];
                            }
                            if (label) {
                                let key = String(c.list_name).toLowerCase() + '::' + String(c.name).toLowerCase();
                                valueMap[key] = label;
                            }
                        }
                    });
                }
            } catch (e) {
                console.error("Erreur lors de la récupération des labels.", e);
            }
        }

        function getTranslatedHeader(xmlName) {
            let key = String(xmlName).toLowerCase();
            if (headerMap[key]) return headerMap[key];
            return xmlName.toUpperCase().replace(/_/g, ' ');
        }

        function getTranslatedValue(val, xmlName) {
            if (val === null || val === undefined || val === '') return '';
            if (Array.isArray(val)) return val; 
            
            let xmlNameLower = String(xmlName).toLowerCase();
            let listName = questionListMap[xmlNameLower];
            
            if (listName) {
                let parts = String(val).split(' ');
                let translatedParts = parts.map(p => {
                    let pLower = String(p).toLowerCase();
                    let t = valueMap[listName + '::' + pLower];
                    if (t) return p + ' : ' + t;
                    return p;
                });
                return translatedParts.join(' ; ');
            }
            return val;
        }

        function getKoboValue(row, possibleKeys, excludeKeys = []) {
            for (let key of Object.keys(row)) {
                let parts = key.split('/');
                let variableName = parts[parts.length - 1].toLowerCase();
                let originalXmlName = parts[parts.length - 1];
                
                let isExcluded = excludeKeys.some(ex => variableName.includes(ex));
                if (isExcluded) continue;

                for (let pk of possibleKeys) {
                    if (variableName.includes(pk)) {
                        let rawValue = row[key];
                        return getTranslatedValue(rawValue, originalXmlName);
                    }
                }
            }
            return '';
        }

        function verifyDataSync(apiCount) {
            let tableCount = 0;
            if (apiCount > 0) tableCount = $('#table-body tr').length;

            const statusDiv = $('#sync-status');
            if (apiCount === tableCount) {
                statusDiv.html(`<span class="badge bg-success sync-badge"><i class="fas fa-check-double"></i> Intégrité Validée : ${apiCount} JSON = ${tableCount} HTML</span>`);
            } else {
                statusDiv.html(`<span class="badge bg-danger sync-badge"><i class="fas fa-exclamation-triangle"></i> Alerte de sécurité : JSON (${apiCount}) ≠ HTML (${tableCount})</span>`);
            }
        }

        async function fetchData() {
            $('#loading-box').show();
            $('#error-box').hide();
            $('#table-body').empty();
            $('#table-group-header-row').empty();
            $('#table-sub-header-row').empty();
            $('#sync-status').html('<span class="badge bg-warning text-dark sync-badge"><i class="fas fa-spinner fa-spin"></i> Audit en cours...</span>');
            
            $('#loading-text').text("1/2: Récupération du dictionnaire Kobo...");
            await fetchSchema();

            $('#loading-text').text("2/2: Téléchargement des données de terrain...");
            const timestamp = new Date().getTime();
            const koboUrl = 'https://kf.kobotoolbox.org/api/v2/assets/ath6cv2NrXEUijffeKJqSf/data.json?_t=' + timestamp;
            const apiUrl = 'https://corsproxy.io/?' + encodeURIComponent(koboUrl);

            try {
                const response = await fetch(apiUrl, { 
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });
                
                if (!response.ok) throw new Error('Erreur réseau : Code ' + response.status);
                
                const json = await response.json();
                allData = json.results || [];
                
                renderTable(allData);
                verifyDataSync(allData.length);

            } catch (error) {
                $('#error-box').html('<strong>Erreur de synchronisation :</strong> ' + error.message).show();
                $('#sync-status').html('<span class="badge bg-danger sync-badge"><i class="fas fa-times-circle"></i> Échec du contrôle</span>');
            } finally {
                $('#loading-box').hide();
            }
        }

        function renderTable(data) {
            const tbody = $('#table-body');
            const groupHeaderTr = $('#table-group-header-row');
            const subHeaderTr = $('#table-sub-header-row');
            
            tbody.empty();
            groupHeaderTr.empty();
            subHeaderTr.empty();

            if (data.length === 0) {
                groupHeaderTr.append('<th class="group-header-survey">Données</th>');
                subHeaderTr.append('<th class="sub-header-survey">Aucune donnée</th>');
                tbody.append('<tr><td class="text-center py-4 text-muted">Aucune donnée trouvée sur le serveur KoboToolbox.</td></tr>');
                $('#record-count').text(0);
                return;
            }

            // A. Définition ordonnée des 7 colonnes de base (Toujours considérées comme Questionnaire / Saisies)
            let baseColsInfo = [
                { key: 'dren', matches: ['dren'], ex: ['activite', 'produit', 'budget', 'cisco', 'zap'], label: 'DREN', xmlName: '' },
                { key: 'cisco', matches: ['cisco'], ex: ['activite', 'produit', 'budget'], label: 'CISCO', xmlName: '' },
                { key: 'zap', matches: ['zap'], ex: ['activite', 'produit', 'budget'], label: 'ZAP', xmlName: '' },
                { key: 'activite', matches: ['activite', 'activité'], ex: ['sous_activite', 'sous-activite'], label: 'Activité', xmlName: '' },
                { key: 'produit', matches: ['produit'], ex: ['sous_produit', 'sous-produit'], label: 'Produit', xmlName: '' },
                { key: 'sousActivite', matches: ['sous_activite', 'sous-activite'], ex: [], label: 'Sous-activité', xmlName: '' },
                { key: 'sousProduit', matches: ['sous_produit', 'sous-produit'], ex: [], label: 'Sous-produit', xmlName: '' }
            ];

            function findXmlName(row, possibleKeys, excludeKeys) {
                for (let key of Object.keys(row)) {
                    let parts = key.split('/');
                    let variableName = parts[parts.length - 1].toLowerCase();
                    let originalXmlName = parts[parts.length - 1];
                    let isExcluded = excludeKeys.some(ex => variableName.includes(ex));
                    if (isExcluded) continue;
                    for (let pk of possibleKeys) {
                        if (variableName.includes(pk)) return originalXmlName;
                    }
                }
                return null;
            }

            // Extraction des vrais noms XML pour traduire les 7 en-têtes de base
            for(let r of data) {
                baseColsInfo.forEach(col => {
                    if (!col.xmlName) {
                        let found = findXmlName(r, col.matches, col.ex);
                        if (found) {
                            col.xmlName = found;
                            col.label = getTranslatedHeader(found);
                        }
                    }
                });
            }

            // Helper pour savoir si une clé brute Kobo fait partie des 7 colonnes de base
            function isBaseColumn(key) {
                let parts = key.split('/');
                let v = parts[parts.length - 1].toLowerCase();
                let isEx = (arr) => arr.some(ex => v.includes(ex));

                if (v.includes('dren') && !isEx(['activite', 'produit', 'budget', 'cisco', 'zap'])) return true;
                if (v.includes('cisco') && !isEx(['activite', 'produit', 'budget'])) return true;
                if (v.includes('zap') && !isEx(['activite', 'produit', 'budget'])) return true;
                if ((v.includes('activite') || v.includes('activité')) && !isEx(['sous_activite', 'sous-activite'])) return true;
                if (v.includes('produit') && !isEx(['sous_produit', 'sous-produit'])) return true;
                if (v.includes('sous_activite') || v.includes('sous-activite')) return true;
                if (v.includes('sous_produit') || v.includes('sous-produit')) return true;
                
                return false;
            }

            // B. Tri et Répartition de toutes les AUTRES colonnes du JSON
            let extraSurveyKeysSet = new Set();
            let metadataKeysSet = new Set();

            data.forEach(row => {
                Object.keys(row).forEach(key => {
                    // Les pièces jointes et statuts de validation restent exclus ou traités à part
                    if (key === '_attachments' || key === '_validation_status') return; 
                    if (isBaseColumn(key)) return; // Géré par les 7 de base

                    let parts = key.split('/');
                    let xmlNameLower = parts[parts.length - 1].toLowerCase();

                    // Si le nom contient un mot-clé système ou commence par un tiret du bas -> C'est une métadonnée
                    let isMeta = metaKeywords.some(kw => xmlNameLower.includes(keyKeywordsClean(kw))) || parts[parts.length - 1].startsWith('_');
                    
                    if (isMeta) {
                        metadataKeysSet.add(key);
                    } else {
                        extraSurveyKeysSet.add(key);
                    }
                });
            });

            function keyKeywordsClean(kw) { return kw.replace(/_/g, ''); }

            let extraSurveyKeys = Array.from(extraSurveyKeysSet);
            let metadataKeys = Array.from(metadataKeysSet);

            // C. CALCUL ET RENDU DES DEUX GRANDS GROUPES (Ligne 1 de l'en-tête)
            let totalSurveyColumnsCount = baseColsInfo.length + extraSurveyKeys.length;
            let totalMetadataColumnsCount = metadataKeys.length;

            if (totalSurveyColumnsCount > 0) {
                groupHeaderTr.append(`<th colspan="${totalSurveyColumnsCount}" class="group-header-survey"><i class="fas fa-edit"></i> Réponses aux Questionnaires KoboToolbox (Saisies Utilisateurs)</th>`);
            }
            if (totalMetadataColumnsCount > 0) {
                groupHeaderTr.append(`<th colspan="${totalMetadataColumnsCount}" class="group-header-meta"><i class="fas fa-cogs"></i> Métadonnées KoboToolbox (Générées Automatiquement)</th>`);
            }

            // D. RENDU DES EN-TÊTES INDIVIDUELS (Ligne 2 de l'en-tête)
            // 1. Les 7 de base (A gauche)
            baseColsInfo.forEach(col => {
                subHeaderTr.append(`<th class="sub-header-survey">${col.label}</th>`);
            });
            // 2. Les questions de formulaire supplémentaires (Au milieu)
            extraSurveyKeys.forEach(key => {
                let xmlName = key.split('/').pop();
                subHeaderTr.append(`<th class="sub-header-survey">${getTranslatedHeader(xmlName)}</th>`);
            });
            // 3. Les métadonnées automatiques (A droite)
            metadataKeys.forEach(key => {
                let xmlName = key.split('/').pop();
                subHeaderTr.append(`<th class="sub-header-meta">${getTranslatedHeader(xmlName)}</th>`);
            });


            // E. FORMATAGE DES CELLULES ET CONSOLIDATION
            function formatExtraValue(val, colName, rowData, xmlName) {
                if (val === null || val === undefined) return '';

                let translatedVal = getTranslatedValue(val, xmlName);
                let parts = [];
                if (Array.isArray(translatedVal)) {
                    parts = translatedVal.map(item => {
                        if (typeof item === 'object') return Object.values(item).join(' | ');
                        return String(item);
                    });
                } else {
                    parts = [String(translatedVal)];
                }

                if (colName && colName.includes('ENTITE')) {
                    let allSubParts = parts.flatMap(p => p.split(/\s*;\s*/)).filter(Boolean);
                    parts = [...new Set(allSubParts)];
                } else if (colName && colName.includes('OBSERVATIONS')) {
                    let allSubParts = parts.flatMap(p => p.split(/\s*;\s*/)).filter(Boolean);
                    parts = allSubParts;
                }

                const linkify = (str) => {
                    if (!rowData || !rowData._attachments) return str;
                    let subParts = str.split(' | ');
                    let linkifiedSubParts = subParts.map(subStr => {
                        let att = rowData._attachments.find(a => a.media_file_basename === subStr);
                        if (att && att.download_url) {
                            return `<a href="${att.download_url}" target="_blank" class="badge bg-primary text-white text-decoration-none py-1 px-2 mx-1 shadow-sm"><i class="fas fa-external-link-alt"></i> ${subStr}</a>`;
                        }
                        return subStr;
                    });
                    return linkifiedSubParts.join(' | ');
                };

                return parts.map(p => linkify(p)).join(' ; ');
            }

            // F. REMPLISSAGE DES LIGNES DE DONNÉES
            data.forEach(row => {
                const dren = getKoboValue(row, ['dren'], ['activite', 'produit', 'budget', 'cisco', 'zap']);
                const cisco = getKoboValue(row, ['cisco'], ['activite', 'produit', 'budget']);
                const zap = getKoboValue(row, ['zap'], ['activite', 'produit', 'budget']);
                const activite = getKoboValue(row, ['activite', 'activité'], ['sous_activite', 'sous-activite']);
                const produit = getKoboValue(row, ['produit'], ['sous_produit', 'sous-produit']);
                const sousActivite = getKoboValue(row, ['sous_activite', 'sous-activite'], []);
                const sousProduit = getKoboValue(row, ['sous_produit', 'sous-produit'], []);

                const tr = $('<tr></tr>');
                
                // 1. Injection des 7 colonnes de base (Saisies)
                tr.append($('<td></td>').text(dren));
                tr.append($('<td></td>').text(cisco));
                tr.append($('<td></td>').text(zap));
                tr.append($('<td></td>').text(activite));
                tr.append($('<td></td>').text(produit));
                tr.append($('<td></td>').text(sousActivite));
                tr.append($('<td></td>').text(sousProduit));
                
                // 2. Injection des questions de formulaire supplémentaires (Saisies)
                extraSurveyKeys.forEach(key => {
                    let xmlName = key.split('/').pop();
                    let colName = xmlName.toUpperCase();
                    let valHtml = formatExtraValue(row[key], colName, row, xmlName);
                    tr.append($('<td></td>').html(valHtml));
                });

                // 3. Injection des métadonnées automatiques (Système - Tout à droite)
                metadataKeys.forEach(key => {
                    let xmlName = key.split('/').pop();
                    let colName = xmlName.toUpperCase();
                    let valHtml = formatExtraValue(row[key], colName, row, xmlName);
                    tr.append($('<td></td>').html(valHtml));
                });

                // Moteur de filtrage (Basé sur les 7 clés d'indexation principales)
                tr.data('search', {
                    dren: String(dren).toLowerCase(),
                    cisco: String(cisco).toLowerCase(),
                    zap: String(zap).toLowerCase(),
                    activite: String(activite).toLowerCase(),
                    produit: String(produit).toLowerCase(),
                    sousActivite: String(sousActivite).toLowerCase(),
                    sousProduit: String(sousProduit).toLowerCase()
                });

                tbody.append(tr);
            });
            $('#record-count').text(data.length);
        }

        function applyFilters() {
            const filters = {
                dren: $('#filter-dren').val().toLowerCase(),
                cisco: $('#filter-cisco').val().toLowerCase(),
                zap: $('#filter-zap').val().toLowerCase(),
                activite: $('#filter-activite').val().toLowerCase(),
                produit: $('#filter-produit').val().toLowerCase(),
                sousActivite: $('#filter-sous-activite').val().toLowerCase(),
                sousProduit: $('#filter-sous-produit').val().toLowerCase()
            };

            let visibleCount = 0;
            $('#table-body tr').each(function() {
                const s = $(this).data('search');
                if (!s) return; 

                const match = Object.keys(filters).every(k => s[k].includes(filters[k]));

                if (match) {
                    $(this).show();
                    visibleCount++;
                } else {
                    $(this).hide();
                }
            });
            $('#record-count').text(visibleCount);
        }

        function clearFilters() {
            $('.filter-input').val('');
            applyFilters();
        }
        
        function downloadCSV(csv, filename) {
            let csvFile = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8;"});
            let downloadLink = document.createElement("a");
            downloadLink.download = filename;
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }

        function exportTableToCSV(filename) {
            let csv = [];
            
            // Pour l'export CSV, on prend les en-têtes de la ligne 2 (les noms réels des colonnes)
            let rows = document.querySelectorAll("#data-table tr");
            
            for (let i = 0; i < rows.length; i++) {
                // On ignore la ligne 1 de groupement global dans l'export Excel/CSV pour garder une structure plate propre
                if (rows[i].id === 'table-group-header-row') continue;

                if (rows[i].style.display !== 'none') {
                    let row = [], cols = rows[i].querySelectorAll("td, th");
                    for (let j = 0; j < cols.length; j++) {
                        let data = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, '').replace(/"/g, '""').trim();
                        row.push('"' + data + '"');
                    }
                    csv.push(row.join(";")); 
                }
            }
            downloadCSV(csv.join("\n"), filename);
        }

        $(document).ready(function() {
            fetchData();
            let typingTimer;
            $('.filter-input').on('keyup', function () {
                clearTimeout(typingTimer);
                typingTimer = setTimeout(applyFilters, 300);
            });
            $('.filter-input').on('change', applyFilters);
        });
    </script>
</body>
</html>
